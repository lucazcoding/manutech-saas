version: "3.9"

services:
  # ─── Banco de Dados ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Migrations ────────────────────────────────────────────────────────────
  migrations:
    build:
      context: .
      dockerfile: infra/migrations/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head

  # ─── Auth Service ──────────────────────────────────────────────────────────
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Asset Service ─────────────────────────────────────────────────────────
  asset:
    build:
      context: .
      dockerfile: services/asset/Dockerfile
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Order Service ─────────────────────────────────────────────────────────
  order:
    build:
      context: .
      dockerfile: services/order/Dockerfile
    env_file: .env
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Inventory Service ─────────────────────────────────────────────────────
  inventory:
    build:
      context: .
      dockerfile: services/inventory/Dockerfile
    env_file: .env
    ports:
      - "8004:8004"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Finance Service ───────────────────────────────────────────────────────
  finance:
    build:
      context: .
      dockerfile: services/finance/Dockerfile
    env_file: .env
    ports:
      - "8005:8005"
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Notification Service ──────────────────────────────────────────────────
  notification:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    env_file: .env
    ports:
      - "8006:8006"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Nginx (API Gateway) ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tests/frontend:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - auth
      - asset
      - order
      - inventory
      - finance
      - notification

volumes:
  postgres_data:
  redis_data:
