events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;

    limit_req_status 429;

    # ── DNS Dinâmico (evita cache de IP ao reiniciar containers) ─────────────
    resolver 127.0.0.11 ipv6=off valid=10s;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream auth_service         { server auth:8001; }
    upstream asset_service        { server asset:8002; }
    upstream order_service        { server order:8003; }
    upstream inventory_service    { server inventory:8004; }
    upstream finance_service      { server finance:8005; }
    upstream notification_service { server notification:8006; }

    server {
        listen 80;
        server_name _;

        # Variáveis forçam o nginx a re-resolver DNS a cada requisição
        set $auth_upstream         http://auth:8001;
        set $asset_upstream        http://asset:8002;
        set $order_upstream        http://order:8003;
        set $inventory_upstream    http://inventory:8004;
        set $finance_upstream      http://finance:8005;
        set $notification_upstream http://notification:8006;

        # ── Headers de Segurança ────────────────────────────────────────────
        add_header X-Frame-Options        "DENY"            always;
        add_header X-Content-Type-Options "nosniff"         always;
        add_header X-XSS-Protection       "1; mode=block"   always;
        add_header Referrer-Policy        "no-referrer"     always;

        # ── Auth Service ────────────────────────────────────────────────────
        location /api/v1/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass $auth_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /api/v1/auth {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $auth_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /api/v1/users {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $auth_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── GET /assets/:id/orders → Order Service (mais específico que /assets) ─
        location ~ ^/api/v1/assets/[0-9]+/orders {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $order_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Asset Service ───────────────────────────────────────────────────
        location /api/v1/assets {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $asset_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── GET /orders/:id/budget → Finance Service (mais específico que /orders)
        location ~ ^/api/v1/orders/[0-9]+/budget {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $finance_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Order Service ───────────────────────────────────────────────────
        location /api/v1/orders {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $order_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            client_max_body_size 25M;
        }

        # ── Inventory Service ───────────────────────────────────────────────
        location /api/v1/materials {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $inventory_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /api/v1/movements {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $inventory_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /api/v1/stock {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $inventory_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Finance Service ─────────────────────────────────────────────────
        location /api/v1/costs {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $finance_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /api/v1/budgets {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $finance_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /api/v1/reports {
            limit_req zone=global burst=10 nodelay;
            proxy_pass $finance_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Notification Service (REST + WebSocket) ─────────────────────────
        location /api/v1/notifications {
            limit_req zone=global burst=20 nodelay;
            proxy_pass $notification_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /api/v1/notifications/ws {
            proxy_pass $notification_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Health Global ────────────────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Frontend de Teste (SPA) ──────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
